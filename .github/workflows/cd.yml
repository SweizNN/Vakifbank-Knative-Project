# ============================================================
#  .github/workflows/cd.yml
#  VakıfBank Knative — Automated CD Pipeline (DigitalOcean Droplet)
#
#  Automated deployment pipeline to DigitalOcean Droplet:
#  Droplet IP: 134.122.61.206 (Ubuntu 22.04 LTS, 4 vCPUs, 8 GB RAM)
#
#  Pipeline Workflow:
#  1. test         → Run python syntax check & import smoke tests
#  2. build-push   → Build multi-arch Docker images & push to Docker Hub
#  3. deploy       → SSH into DigitalOcean Droplet, update Minikube & Knative
# ============================================================

name: "VakıfBank Knative — Remote CD Pipeline"

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "producer/**"
      - "services/**"
      - "frontend/**"
      - "k8s/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKER_USER: "sweizn"
  TARGET_DROPLET_IP: "134.122.61.206"

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: "🧪 Test — ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: "producer",           path: "producer" }
          - { name: "transaction-logger", path: "services/transaction-logger" }
          - { name: "fraud-alert",        path: "services/fraud-alert" }

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "${{ matrix.service.path }}/requirements.txt"

      - name: "📦 Install Dependencies"
        working-directory: ${{ matrix.service.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: "🔍 Lint Check (flake8)"
        working-directory: ${{ matrix.service.path }}
        run: |
          flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: "💨 Smoke Test (Import Verification)"
        working-directory: ${{ matrix.service.path }}
        run: |
          python -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('main', 'main.py')
          mod  = importlib.util.module_from_spec(spec)
          try:
              spec.loader.exec_module(mod)
              print('✅ ${{ matrix.service.name }} — import check passed')
          except Exception as e:
              print(f'❌ Import error: {e}')
              sys.exit(1)
          "

  # ── Job 2: Docker Build & Push ─────────────────────────────────────────────
  build-push:
    name: "🐳 Build & Push — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    strategy:
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            image_name: frontend

          - service:    producer-api
            context:    ./producer
            image_name: producer-api

          - service:    transaction-logger
            context:    ./services/transaction-logger
            image_name: transaction-logger

          - service:    fraud-alert
            context:    ./services/fraud-alert
            image_name: fraud-alert

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏷️ Generate Image Tag"
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: sha-${SHORT_SHA}"

      - name: "⚙️ Setup Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔐 Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME || env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: "🏷️ Docker Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME || env.DOCKER_USER }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: "🐳 Build & Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Job 3: Remote Continuous Deployment (SSH to DigitalOcean) ──────────────
  deploy:
    name: "🚀 Remote CD Deploy — DigitalOcean Droplet"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name != 'pull_request'

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏷️ Determine Target Image Tag"
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: "🚀 SSH Remote Deployment to DigitalOcean"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_DROPLET_IP || env.TARGET_DROPLET_IP }}
          username: ${{ secrets.DO_SSH_USER || 'root' }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GITHUB_SHA,DOCKER_USER
          script: |
            set -e
            SHORT_SHA="${GITHUB_SHA::7}"
            IMAGE_TAG="sha-${SHORT_SHA}"
            DOCKER_USER="${DOCKER_USER:-sweizn}"
            PROJECT_DIR="/root/Vakifbank-Knative-Project"

            echo "=========================================================="
            echo " 🚀 DEPLOYING TO DIGITALOCEAN DROPLET (134.122.61.206)"
            echo " Image Tag: ${IMAGE_TAG}"
            echo "=========================================================="

            # 1. Ensure Minikube cluster is running
            if ! minikube status &>/dev/null; then
              echo "⚠️ Minikube is not running. Starting Minikube..."
              minikube start --driver=docker --cpus=4 --memory=4096 --kubernetes-version=v1.30.0
            else
              echo "✅ Minikube is running."
            fi

            # 2. Ensure Knative Serving is installed
            if ! kubectl get ns knative-serving &>/dev/null; then
              echo "📦 Installing Knative Serving + Kourier Ingress..."
              kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.14.0/serving-crds.yaml
              kubectl apply -f https://github.com/knative/serving/releases/download/knative-v1.14.0/serving-core.yaml
              kubectl apply -f https://github.com/knative/net-kourier/releases/download/knative-v1.14.0/kourier.yaml
              kubectl patch configmap/config-network -n knative-serving \
                --type merge --patch '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
            fi

            # 3. Ensure Knative Eventing is installed
            if ! kubectl get ns knative-eventing &>/dev/null; then
              echo "📦 Installing Knative Eventing..."
              kubectl apply -f https://github.com/knative/eventing/releases/download/knative-v1.14.0/eventing-crds.yaml
              kubectl apply -f https://github.com/knative/eventing/releases/download/knative-v1.14.0/eventing-core.yaml
              kubectl apply -f https://github.com/knative/eventing/releases/download/knative-v1.14.0/in-memory-channel.yaml
              kubectl apply -f https://github.com/knative/eventing/releases/download/knative-v1.14.0/mt-channel-broker.yaml
            fi

            # 4. Clone or Pull target repository
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📥 Cloning codebase repository..."
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              echo "🔄 Updating codebase repository..."
              cd "$PROJECT_DIR"
              git fetch origin
              git reset --hard origin/main || git reset --hard origin/master
            fi

            # 5. Apply Kubernetes core manifests
            echo "📄 Applying Kubernetes Namespace & ConfigMap..."
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/broker.yaml

            # 6. Apply parameterized workloads with current image SHA tag
            echo "🐳 Deploying Services with Image Tag: ${IMAGE_TAG}..."
            sed "s/:latest/:${IMAGE_TAG}/g" k8s/ksvc.yaml | kubectl apply -f -
            sed "s/:latest/:${IMAGE_TAG}/g" k8s/producer-deployment.yaml | kubectl apply -f -
            sed "s/:latest/:${IMAGE_TAG}/g" k8s/frontend-deployment.yaml | kubectl apply -f -

            # 7. Apply Eventing bindings & triggers
            kubectl apply -f k8s/sinkbinding.yaml
            kubectl apply -f k8s/triggers.yaml

            # 8. Verify Rollout Status
            echo "⏳ Waiting for pod rollout..."
            kubectl rollout status deployment/frontend -n banking-system --timeout=120s
            kubectl rollout status deployment/producer-api -n banking-system --timeout=120s

            # 9. Setup Port-Forwarding for External Access
            echo "🔌 Setting up Port-Forwarding for external access..."
            pkill -f "kubectl port-forward.*frontend-service" || true
            nohup kubectl port-forward --address 0.0.0.0 svc/frontend-service 30080:80 -n banking-system > /dev/null 2>&1 &

            echo "=========================================================="
            echo " ✅ DEPLOYMENT SUCCESSFUL!"
            echo " 🌐 Access Frontend UI at: http://134.122.61.206:30080"
            echo "=========================================================="
            kubectl get pods,ksvc -n banking-system

      - name: "📊 Deployment Summary"
        if: always()
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Remote CD Deployment Summary — DigitalOcean Droplet

          - **Droplet Target IP**: \`134.122.61.206\`
          - **Deployed Tag**: \`sha-${SHORT_SHA}\`
          - **Web UI Access**: [http://134.122.61.206:30080](http://134.122.61.206:30080)

          ### 📦 Deployed Services:
          1. **Frontend**: \`sweizn/frontend:sha-${SHORT_SHA}\` (NodePort 30080)
          2. **Producer API**: \`sweizn/producer-api:sha-${SHORT_SHA}\`
          3. **Transaction Logger**: \`sweizn/transaction-logger:sha-${SHORT_SHA}\` (Knative ksvc)
          4. **Fraud Alert**: \`sweizn/fraud-alert:sha-${SHORT_SHA}\` (Knative ksvc)
          EOF
