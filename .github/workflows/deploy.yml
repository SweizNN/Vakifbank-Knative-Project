# ============================================================
#  .github/workflows/deploy.yml
#  VakıfBank Knative — CI Pipeline
#
#  Bu workflow GitHub'ın hosted runner'larında çalışır.
#  Deploy adımı LOCAL'de manuel olarak yapılır (Minikube erişimi
#  için self-hosted runner gerekmediği için).
#
#  Akış:
#  1. test       → Python lint & smoke test (3 servis paralel)
#  2. build-push → Docker image build & push to Docker Hub
#  3. notify     → Hangi image tag'inin deploy edileceğini özetler
#
#  Gerekli GitHub Secrets:
#  - DOCKER_HUB_TOKEN  : Docker Hub → Account Settings → Access Token
# ============================================================
name: "VakıfBank Knative — CI Pipeline"

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "producer/**"
      - "services/**"
      - "frontend/**"
      - "k8s/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # GitHub UI'dan manuel tetikleme

env:
  REGISTRY: docker.io
  IMAGE_TAG: ${{ github.sha }}

# ──────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint & Test (Paralel — 3 Servis) ──────────────────
  test:
    name: "🧪 Test — ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # Bir servis fail olsa diğerleri devam etsin
      matrix:
        service:
          - { name: "producer",           path: "producer" }
          - { name: "transaction-logger", path: "services/transaction-logger" }
          - { name: "fraud-alert",        path: "services/fraud-alert" }

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.11 Kur"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "${{ matrix.service.path }}/requirements.txt"

      - name: "📦 Bağımlılıkları Yükle"
        working-directory: ${{ matrix.service.path }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: "🔍 flake8 — Syntax & Hata Kontrolü"
        working-directory: ${{ matrix.service.path }}
        run: |
          # Kritik hatalar (syntax error, undefined name) — pipeline durdurur
          flake8 main.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: "🔍 flake8 — Stil Uyarıları (max 120 karakter)"
        working-directory: ${{ matrix.service.path }}
        run: |
          # Stil uyarıları — pipeline'ı durdurmaz, rapor üretir
          flake8 main.py \
            --count \
            --exit-zero \
            --max-complexity=12 \
            --max-line-length=120 \
            --statistics

      - name: "💨 Smoke Test — Import Kontrolü"
        working-directory: ${{ matrix.service.path }}
        run: |
          # Uygulamanın import edilip edilemediğini test et
          python -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('main', 'main.py')
          mod  = importlib.util.module_from_spec(spec)
          try:
              spec.loader.exec_module(mod)
              print('✅ ${{ matrix.service.name }} — import başarılı')
          except Exception as e:
              print(f'❌ Import hatası: {e}')
              sys.exit(1)
          "

      - name: "📊 Test Özeti"
        if: always()
        run: |
          echo "### 🧪 ${{ matrix.service.name }} Test Sonucu" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Test**: ✅" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Docker Build & Push (Paralel — 4 Image) ───────────
  build-push:
    name: "🐳 Build — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    # PR'larda sadece build yap, push'u atla
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    strategy:
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            image_name: frontend

          - service:    producer-api
            context:    ./producer
            image_name: producer-api

          - service:    transaction-logger
            context:    ./services/transaction-logger
            image_name: transaction-logger

          - service:    fraud-alert
            context:    ./services/fraud-alert
            image_name: fraud-alert

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🏷️ Image Tag Oluştur"
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: sha-${SHORT_SHA}"

      - name: "⚙️ Docker Buildx Kur"
        uses: docker/setup-buildx-action@v3

      - name: "🔐 Docker Hub Giriş"
        uses: docker/login-action@v3
        with:
          username: "sweizn"
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: "🏷️ Metadata & Tag Hazırla"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sweizn/${{ matrix.image_name }}
          tags: |
            # Her commit için kısa SHA tag (örn: sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Branch adıyla tag (örn: main)
            type=ref,event=branch
            # main branch'te latest tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: "🐳 Build & Push"
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.context }}/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — sonraki build'i hızlandırır
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # amd64 (x86 sunucu) + arm64 (Apple M1/M2) desteği
          platforms:  linux/amd64,linux/arm64

      - name: "📊 Image Özeti"
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DOCKER_USER="sweizn"
          echo "### 🐳 ${{ matrix.service }} Image" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${DOCKER_USER}/${{ matrix.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA Tag | \`sha-${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | \`latest\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Deploy Talimatları (Local CD için bilgi üret) ──────
  notify:
    name: "📋 Local Deploy Talimatları"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name != 'pull_request'

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📋 Deploy Talimatları Üret"
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DOCKER_USER="sweizn"
          BRANCH="${{ github.ref_name }}"

          echo "==========================================="
          echo " CI TAMAMLANDI — LOCAL DEPLOY TALİMATLARI"
          echo "==========================================="
          echo ""
          echo "Aşağıdaki komutu local terminalinde çalıştır:"
          echo ""
          echo "  ./scripts/deploy-local.sh sha-${SHORT_SHA}"
          echo ""
          echo "Veya latest tag ile:"
          echo ""
          echo "  ./scripts/deploy-local.sh latest"
          echo ""
          echo "Build edilen image'lar:"
          echo "  docker.io/${DOCKER_USER}/frontend:sha-${SHORT_SHA}"
          echo "  docker.io/${DOCKER_USER}/producer-api:sha-${SHORT_SHA}"
          echo "  docker.io/${DOCKER_USER}/transaction-logger:sha-${SHORT_SHA}"
          echo "  docker.io/${DOCKER_USER}/fraud-alert:sha-${SHORT_SHA}"

      - name: "📊 GitHub Step Summary"
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DOCKER_USER="sweizn"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ CI Başarılı — Local Deploy için Hazır

          > CI tamamlandı. Aşağıdaki komutu **local terminalinde** çalıştır:

          \`\`\`bash
          ./scripts/deploy-local.sh sha-${SHORT_SHA}
          \`\`\`

          ### 📦 Build Edilen Image'lar

          | Servis | Image | Tag |
          |--------|-------|-----|
          | Frontend | \`${DOCKER_USER}/frontend\` | \`sha-${SHORT_SHA}\` |
          | Producer API | \`${DOCKER_USER}/producer-api\` | \`sha-${SHORT_SHA}\` |
          | TX Logger | \`${DOCKER_USER}/transaction-logger\` | \`sha-${SHORT_SHA}\` |
          | Fraud Alert | \`${DOCKER_USER}/fraud-alert\` | \`sha-${SHORT_SHA}\` |

          ### 🔗 Docker Hub
          [hub.docker.com/u/${DOCKER_USER}](https://hub.docker.com/u/${DOCKER_USER})
          EOF
