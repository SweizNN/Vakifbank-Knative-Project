server {
    listen 80;
    server_name _;

    # Frontend statik dosyalar
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # Cache headers
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Statik asset'ler için cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root  /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Producer API'ye reverse proxy
    # K8s Service adı: producer-api-service.banking-system.svc.cluster.local
    location /api/ {
        proxy_pass         http://producer-api-service.banking-system.svc.cluster.local:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # CORS headers (geliştirme için)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check endpoint (K8s liveness probe)
    location /nginx-health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}
