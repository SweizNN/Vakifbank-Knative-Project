# ============================================================
#  triggers.yaml
#  Knative Eventing — Event Routing Triggers
# ============================================================

# ── Trigger 1: Standart Bankacılık İşlemleri (Low Risk) ──────────────────────
apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: standard-tx-trigger
  namespace: banking-system
  labels:
    app.kubernetes.io/name: standard-tx-trigger
    app.kubernetes.io/part-of: vakifbank-knative-demo
spec:
  broker: banking-broker
  filter:
    attributes:
      type: banking.transaction   # Sadece standart işlemler
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: transaction-logger-service
      namespace: banking-system
  delivery:
    retry: 0
    timeout: PT30S

---
# ── Trigger 2: Fraud / Şüpheli İşlemler (High/Critical Risk) ─────────────────
apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: fraud-alert-trigger
  namespace: banking-system
  labels:
    app.kubernetes.io/name: fraud-alert-trigger
    app.kubernetes.io/part-of: vakifbank-knative-demo
spec:
  broker: banking-broker
  filter:
    attributes:
      type: banking.suspicious    # Yalnızca suspicious event'ler
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: fraud-alert-service
      namespace: banking-system
  delivery:
    retry: 0
    timeout: PT30S

---
# ── Trigger 3: Orta Riskli İşlemler (Medium Risk — Ek Bildirim) ──────────────
apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: medium-risk-trigger
  namespace: banking-system
  labels:
    app.kubernetes.io/name: medium-risk-trigger
    app.kubernetes.io/part-of: vakifbank-knative-demo
spec:
  broker: banking-broker
  filter:
    attributes:
      type:      banking.transaction
      risklevel: medium             # Custom CloudEvent extension attribute
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: transaction-logger-service
      namespace: banking-system
  delivery:
    retry: 0
    timeout: PT30S
